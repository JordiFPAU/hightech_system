# ─── Servidor ────────────────────────────────────────────
quarkus.http.port=8083

# ─── Base de datos ───────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=hightech_user
quarkus.datasource.password=hightech_pass123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/hightech_logistica_db

# ─── JWT ─────────────────────────────────────────────────
mp.jwt.verify.issuer=https://hightech.com
mp.jwt.verify.publickey.location=keys/publicKey.pem

# ─── OpenAPI ─────────────────────────────────────────────
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ─── Hibernate ───────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# ─── Cliente REST hacia Inventario ────────────────────────
quarkus.rest-client.inventario-api.url=http://localhost:8082
quarkus.rest-client.inventario-api.scope=jakarta.inject.Singleton


quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization