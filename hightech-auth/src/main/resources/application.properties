#Servidor

quarkus.http.port=8081
quarkus.http.host=0.0.0.0

#bases de datos

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=hightech_user
quarkus.datasource.password=hightech_pass123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/hightech_auth_db
# Habilitar CORS para permitir peticiones desde React
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

mp.jwt.verify.issuer=https://hightech.com
mp.jwt.verify.publickey.location=keys/publicKey.pem
smallrye.jwt.sign.key.location=keys/privateKey.pem

# ─── OpenAPI ─────────────────────────────────────────────
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ─── Hibernate ───────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
